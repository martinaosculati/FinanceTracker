<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #fafafa;
            color: #1a1a1a;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            background-color: #fff;
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            text-align: center;
        }

        .header-title {
            font-size: 14px;
            color: #999;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .balance {
            font-size: 48px;
            font-weight: 700;
        }

        .balance.positive {
            color: #4CAF50;
        }

        .balance.negative {
            color: #FF5252;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background-color: #fff;
            border-bottom: 1px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
        }

        .tab.active {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
        }

        /* Content */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Type Selector */
        .type-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #f5f5f5;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .type-btn.active {
            background-color: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        /* Input */
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 24px;
        }

        input::placeholder {
            color: #ccc;
        }

        /* Category Buttons */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .category-btn {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            background-color: #f5f5f5;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            font-size: 13px;
            transition: all 0.3s;
        }

        .category-btn.active {
            background-color: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        /* Date Picker */
        .date-picker {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .date-btn {
            padding: 12px 16px;
            background-color: #f5f5f5;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border-radius: 8px;
        }

        .date-display {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }

        /* Add Button */
        .add-btn {
            width: 100%;
            padding: 14px;
            background-color: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.3s;
        }

        .add-btn:hover {
            opacity: 0.9;
        }

        /* Transaction List */
        .transaction {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #f0f0f0;
        }

        .transaction-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .transaction-icon {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .transaction-icon.income {
            background-color: #e8f5e9;
        }

        .transaction-icon.expense {
            background-color: #ffebee;
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-category {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 14px;
        }

        .transaction-date {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .transaction-right {
            text-align: right;
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .transaction-amount.income {
            color: #4CAF50;
        }

        .transaction-amount.expense {
            color: #FF5252;
        }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #ccc;
            padding: 4px;
        }

        /* Summary */
        .summary-row {
            background-color: #fff;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #f0f0f0;
        }

        .summary-category {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .summary-bar-container {
            margin-bottom: 6px;
        }

        .summary-bar {
            height: 4px;
            background-color: #FF5252;
            border-radius: 2px;
            margin-bottom: 6px;
        }

        .summary-bar.income {
            background-color: #4CAF50;
        }

        .summary-amount {
            font-weight: 700;
            color: #FF5252;
            text-align: right;
            font-size: 14px;
        }

        .summary-amount.income {
            color: #4CAF50;
        }

        .empty-message {
            text-align: center;
            color: #ccc;
            padding: 32px 20px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-title">Total Balance</div>
            <div class="balance" id="balance">€0.00</div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('transactions')">Transactions</div>
            <div class="tab" onclick="switchTab('summary')">Summary</div>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Transactions Tab -->
            <div id="transactions-tab" style="display: block;">
                <div class="section">
                    <div class="section-label">Type</div>
                    <div class="type-selector">
                        <button class="type-btn active" onclick="setType('expense')">Expense</button>
                        <button class="type-btn" onclick="setType('income')">Income</button>
                    </div>
                </div>

                <div class="section">
                    <div class="section-label">Amount</div>
                    <input type="number" id="amount" placeholder="0.00" step="0.01">
                </div>

                <div class="section">
                    <div class="section-label">Category</div>
                    <div class="categories" id="categories"></div>
                </div>

                <div class="section">
                    <div class="section-label">Date</div>
                    <div class="date-picker">
                        <button class="date-btn" onclick="changeDate(-1)">←</button>
                        <div class="date-display" id="date-display"></div>
                        <button class="date-btn" onclick="changeDate(1)">→</button>
                    </div>
                </div>

                <button class="add-btn" onclick="addTransaction()">Add Transaction</button>

                <div>
                    <div class="section-title" id="trans-count">0 transactions</div>
                    <div id="transactions-list"></div>
                </div>
            </div>

            <!-- Summary Tab -->
            <div id="summary-tab" style="display: none;">
                <div class="section">
                    <div class="section-title">Breakdown</div>
                    <div id="summary-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const EXPENSE_CATEGORIES = ['Food', 'Transport', 'Entertainment', 'Bills', 'Other'];
        const INCOME_CATEGORIES = ['Salary', 'Freelance', 'Bonus', 'Bank Transfer', 'Other'];
        const STORAGE_KEY = 'financeTrackerData';

        let transactions = [];
        let currentType = 'expense';
        let selectedCategory = 'Food';
        let selectedDate = new Date();

        // Initialize
        function init() {
            loadData();
            renderCategories();
            updateDate();
            updateDisplay();
        }

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                transactions = JSON.parse(saved);
            }
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
        }

        // Render categories
        function renderCategories() {
            const cats = currentType === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
            const container = document.getElementById('categories');
            container.innerHTML = cats.map(cat => `
                <button class="category-btn ${cat === selectedCategory ? 'active' : ''}" onclick="setCategory('${cat}')">
                    ${cat}
                </button>
            `).join('');
        }

        // Set type
        function setType(type) {
            currentType = type;
            selectedCategory = currentType === 'expense' ? EXPENSE_CATEGORIES[0] : INCOME_CATEGORIES[0];
            renderCategories();
            updateTypeButtons();
        }

        // Update type buttons
        function updateTypeButtons() {
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // Set category
        function setCategory(cat) {
            selectedCategory = cat;
            renderCategories();
        }

        // Change date
        function changeDate(offset) {
            selectedDate.setDate(selectedDate.getDate() + offset);
            updateDate();
        }

        // Update date display
        function updateDate() {
            document.getElementById('date-display').textContent = selectedDate.toLocaleDateString();
        }

        // Add transaction
        function addTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            transactions.push({
                id: Date.now().toString(),
                amount,
                category: selectedCategory,
                type: currentType,
                date: selectedDate.toLocaleDateString()
            });

            saveData();
            document.getElementById('amount').value = '';
            selectedDate = new Date();
            updateDate();
            updateDisplay();
        }

        // Delete transaction
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            updateDisplay();
        }

        // Switch tab
        function switchTab(tab) {
            document.getElementById('transactions-tab').style.display = tab === 'transactions' ? 'block' : 'none';
            document.getElementById('summary-tab').style.display = tab === 'summary' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Calculate balance
        function getBalance() {
            return transactions.reduce((sum, t) => {
                return t.type === 'income' ? sum + t.amount : sum - t.amount;
            }, 0);
        }

        // Update display
        function updateDisplay() {
            const balance = getBalance();
            const balanceEl = document.getElementById('balance');
            balanceEl.textContent = `€${balance.toFixed(2)}`;
            balanceEl.className = `balance ${balance >= 0 ? 'positive' : 'negative'}`;

            // Transactions list
            const list = document.getElementById('transactions-list');
            document.getElementById('trans-count').textContent = `${transactions.length} transactions`;
            list.innerHTML = transactions.length === 0 
                ? '<div class="empty-message">No transactions yet</div>'
                : transactions.map(t => `
                    <div class="transaction">
                        <div class="transaction-left">
                            <div class="transaction-icon ${t.type}">
                                ${t.type === 'income' ? '📥' : '📤'}
                            </div>
                            <div class="transaction-info">
                                <div class="transaction-category">${t.category}</div>
                                <div class="transaction-date">${t.date}</div>
                            </div>
                        </div>
                        <div class="transaction-right">
                            <div class="transaction-amount ${t.type}">
                                ${t.type === 'income' ? '+' : '-'}€${t.amount.toFixed(2)}
                            </div>
                            <button class="delete-btn" onclick="deleteTransaction('${t.id}')">×</button>
                        </div>
                    </div>
                `).join('');

            // Summary
            updateSummary();
        }

        // Update summary
        function updateSummary() {
            const expenseByCategory = {};
            const incomeByCategory = {};

            EXPENSE_CATEGORIES.forEach(cat => {
                expenseByCategory[cat] = transactions
                    .filter(t => t.category === cat && t.type === 'expense')
                    .reduce((sum, t) => sum + t.amount, 0);
            });

            INCOME_CATEGORIES.forEach(cat => {
                incomeByCategory[cat] = transactions
                    .filter(t => t.category === cat && t.type === 'income')
                    .reduce((sum, t) => sum + t.amount, 0);
            });

            const summary = document.getElementById('summary-list');
            let html = '';

            const maxExpense = Math.max(...Object.values(expenseByCategory), 1);
            const maxIncome = Math.max(...Object.values(incomeByCategory), 1);

            if (Object.values(expenseByCategory).some(v => v > 0)) {
                html += '<div class="section-title" style="color: #FF5252; margin-top: 0;">Expenses</div>';
                html += Object.entries(expenseByCategory)
                    .filter(([_, amount]) => amount > 0)
                    .map(([cat, amount]) => `
                        <div class="summary-row">
                            <div class="summary-category">${cat}</div>
                            <div class="summary-bar-container">
                                <div class="summary-bar" style="width: ${(amount/maxExpense)*100}%"></div>
                            </div>
                            <div class="summary-amount">€${amount.toFixed(2)}</div>
                        </div>
                    `).join('');
            }

            if (Object.values(incomeByCategory).some(v => v > 0)) {
                html += '<div class="section-title" style="color: #4CAF50; margin-top: 24px;">Income</div>';
                html += Object.entries(incomeByCategory)
                    .filter(([_, amount]) => amount > 0)
                    .map(([cat, amount]) => `
                        <div class="summary-row">
                            <div class="summary-category">${cat}</div>
                            <div class="summary-bar-container">
                                <div class="summary-bar income" style="width: ${(amount/maxIncome)*100}%"></div>
                            </div>
                            <div class="summary-amount income">€${amount.toFixed(2)}</div>
                        </div>
                    `).join('');
            }

            summary.innerHTML = html || '<div class="empty-message">No data yet</div>';
        }

        // Start
        init();
    </script>
</body>
</html>
