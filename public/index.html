<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #fafafa;
            color: #1a1a1a;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            background-color: #fff;
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .header-content {
            margin-bottom: 16px;
        }

        .header-title {
            font-size: 12px;
            color: #999;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .balance {
            font-size: 36px;
            font-weight: 700;
        }

        .balance.positive {
            color: #4CAF50;
        }

        .balance.negative {
            color: #FF5252;
        }

        .predicted-balance {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }

        .predicted-title {
            font-size: 11px;
            color: #999;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .predicted-amount {
            font-size: 20px;
            font-weight: 600;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background-color: #fff;
            border-bottom: 1px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
        }

        .tab.active {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
        }

        /* Content */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Type Selector */
        .type-selector {
            display: flex;
            gap: 12px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #f5f5f5;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .type-btn.active {
            background-color: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        /* Input */
        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 24px;
            background-color: #f5f5f5;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 40px;
        }

        input::placeholder {
            color: #ccc;
        }

        select:focus {
            outline: none;
            border-color: #1a1a1a;
            background-color: #fff;
        }

        /* Checkbox */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin: 0;
        }

        .checkbox-container label {
            cursor: pointer;
            font-weight: 500;
            color: #666;
        }

        /* Category Buttons */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .category-btn {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            background-color: #f5f5f5;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            font-size: 13px;
            transition: all 0.3s;
        }

        .category-btn.active {
            background-color: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        /* Date Picker */
        .date-picker {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .date-btn {
            padding: 12px 16px;
            background-color: #f5f5f5;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border-radius: 8px;
        }

        .date-display {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }

        /* Add Button */
        .add-btn {
            width: 100%;
            padding: 14px;
            background-color: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.3s;
        }

        .add-btn:hover {
            opacity: 0.9;
        }

        /* Transaction List */
        .transaction {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #f0f0f0;
        }

        .transaction.recurring {
            border-left: 4px solid #3498db;
            background-color: #f8fbff;
        }

        .transaction-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .transaction-icon {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .transaction-icon.income {
            background-color: #e8f5e9;
        }

        .transaction-icon.expense {
            background-color: #ffebee;
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-category {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 14px;
        }

        .transaction-description {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .transaction-date {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .transaction-recurring-badge {
            display: inline-block;
            background-color: #3498db;
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 6px;
            font-weight: 600;
        }

        .transaction-right {
            text-align: right;
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .transaction-amount.income {
            color: #4CAF50;
        }

        .transaction-amount.expense {
            color: #FF5252;
        }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #ccc;
            padding: 4px;
        }

        /* Summary */
        .summary-row {
            background-color: #fff;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #f0f0f0;
        }

        .summary-category {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .summary-bar-container {
            margin-bottom: 6px;
        }

        .summary-bar {
            height: 4px;
            background-color: #FF5252;
            border-radius: 2px;
            margin-bottom: 6px;
        }

        .summary-bar.income {
            background-color: #4CAF50;
        }

        .summary-amount {
            font-weight: 700;
            color: #FF5252;
            text-align: right;
            font-size: 14px;
        }

        .summary-amount.income {
            color: #4CAF50;
        }

        .empty-message {
            text-align: center;
            color: #ccc;
            padding: 32px 20px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="header-title">Total Balance</div>
                <div class="balance" id="balance">€0.00</div>
            </div>
            <div class="predicted-balance">
                <div class="predicted-title">Predicted Balance (with recurring)</div>
                <div class="predicted-amount" id="predicted-balance">€0.00</div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('transactions')">Transactions</div>
            <div class="tab" onclick="switchTab('summary')">Summary</div>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Transactions Tab -->
            <div id="transactions-tab" style="display: block;">
                <div class="section">
                    <div class="section-label">Type</div>
                    <div class="type-selector">
                        <button class="type-btn active" onclick="setType('expense')">Expense</button>
                        <button class="type-btn" onclick="setType('income')">Income</button>
                    </div>
                </div>

                <div class="section">
                    <div class="section-label">Category</div>
                    <div class="categories" id="categories"></div>
                </div>

                <div class="section" id="subcategories-container" style="display: none;">
                    <div class="section-label">Subcategory</div>
                    <select id="subcategories-select" onchange="setSubcategoryFromSelect()">
                        <option value="">Select subcategory...</option>
                    </select>
                </div>

                <div class="section">
                    <div class="section-label">Amount</div>
                    <input type="number" id="amount" placeholder="0.00" step="0.01">
                </div>

                <div class="section">
                    <div class="section-label">Description (Optional)</div>
                    <input type="text" id="description" placeholder="Add a description...">
                </div>

                <div class="section">
                    <div class="section-label">Date</div>
                    <div class="date-picker">
                        <button class="date-btn" onclick="changeDate(-1)">←</button>
                        <div class="date-display" id="date-display"></div>
                        <button class="date-btn" onclick="changeDate(1)">→</button>
                    </div>
                </div>

                <div class="section">
                    <div class="checkbox-container">
                        <input type="checkbox" id="recurring-checkbox">
                        <label for="recurring-checkbox">Make this recurring (monthly)</label>
                    </div>
                </div>

                <button class="add-btn" onclick="addTransaction()">Add Transaction</button>

                <div>
                    <div class="section-title" id="trans-count">0 transactions</div>
                    <div id="transactions-list"></div>
                </div>
            </div>

            <!-- Summary Tab -->
            <div id="summary-tab" style="display: none;">
                <div class="section">
                    <div class="section-title">Breakdown</div>
                    <div id="summary-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CATEGORIES = {
            expense: {
                'Food': ['Dinner', 'Lunch', 'Groceries'],
                'Transport': ['Gasoline', 'Flights', 'Bus', 'Trains', 'Metro'],
                'Bills': ['Electricity', 'Heating', 'Rental'],
                'Subscriptions': ['Car Payment', 'INPS'],
                'Shopping': [],
                'Entertainment': [],
                'Other': []
            },
            income: {
                'Salary': [],
                'Bonus': [],
                'Bank Transfer': [],
                'Other': []
            }
        };

        const STORAGE_KEY = 'financeTrackerData';

        let transactions = [];
        let recurringTransactions = [];
        let currentType = 'expense';
        let selectedCategory = 'Food';
        let selectedSubcategory = null;
        let selectedDate = new Date();
        let isRecurring = false;

        // Initialize
        function init() {
            loadData();
            renderCategories();
            updateDate();
            updateDisplay();
        }

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                transactions = data.transactions || [];
                recurringTransactions = data.recurring || [];
                generateRecurringForCurrentMonth();
            }
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                transactions,
                recurring: recurringTransactions
            }));
        }

        // Generate recurring transactions for current month
        function generateRecurringForCurrentMonth() {
            const today = new Date();
            const currentMonth = `${today.getFullYear()}-${String(today.getMonth()).padStart(2, '0')}`;

            recurringTransactions.forEach(recurring => {
                const lastGenerated = recurring.lastGenerated || '2000-01';
                if (lastGenerated < currentMonth) {
                    const transactionDate = new Date(today.getFullYear(), today.getMonth(), recurring.date);
                    if (transactionDate > today) {
                        transactionDate.setMonth(transactionDate.getMonth() - 1);
                    }

                    transactions.push({
                        id: `recurring-${recurring.id}-${currentMonth}`,
                        amount: recurring.amount,
                        category: recurring.category,
                        subcategory: recurring.subcategory,
                        description: recurring.description,
                        type: recurring.type,
                        date: transactionDate.toLocaleDateString(),
                        isRecurring: true,
                        recurringId: recurring.id
                    });

                    recurring.lastGenerated = currentMonth;
                }
            });
            saveData();
        }

        // Render categories
        function renderCategories() {
            const cats = CATEGORIES[currentType];
            const container = document.getElementById('categories');
            container.innerHTML = Object.keys(cats).map(cat => `
                <button class="category-btn ${cat === selectedCategory ? 'active' : ''}" onclick="setCategory('${cat}')">
                    ${cat}
                </button>
            `).join('');
            renderSubcategories();
        }

        // Render subcategories
        function renderSubcategories() {
            const subcats = CATEGORIES[currentType][selectedCategory] || [];
            const container = document.getElementById('subcategories-container');
            const selectEl = document.getElementById('subcategories-select');

            if (subcats.length > 0) {
                container.style.display = 'block';
                selectEl.innerHTML = '<option value="">Select subcategory...</option>' + 
                    subcats.map(subcat => `<option value="${subcat}">${subcat}</option>`).join('');
                selectedSubcategory = null;
            } else {
                container.style.display = 'none';
                selectedSubcategory = null;
            }
        }

        // Set type
        function setType(type) {
            currentType = type;
            selectedCategory = Object.keys(CATEGORIES[currentType])[0];
            selectedSubcategory = null;
            renderCategories();
        }

        // Set category
        function setCategory(cat) {
            selectedCategory = cat;
            selectedSubcategory = null;
            renderSubcategories();
        }

        // Set subcategory from select
        function setSubcategoryFromSelect() {
            const selectEl = document.getElementById('subcategories-select');
            selectedSubcategory = selectEl.value || null;
        }

        // Change date
        function changeDate(offset) {
            selectedDate.setDate(selectedDate.getDate() + offset);
            updateDate();
        }

        // Update date display
        function updateDate() {
            document.getElementById('date-display').textContent = selectedDate.toLocaleDateString();
        }

        // Add transaction
        function addTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            const description = document.getElementById('description').value.trim();

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            isRecurring = document.getElementById('recurring-checkbox').checked;

            if (isRecurring) {
                recurringTransactions.push({
                    id: Date.now().toString(),
                    amount,
                    category: selectedCategory,
                    subcategory: selectedSubcategory,
                    description,
                    type: currentType,
                    date: selectedDate.getDate(),
                    lastGenerated: `${selectedDate.getFullYear()}-${String(selectedDate.getMonth()).padStart(2, '0')}`
                });
                transactions.push({
                    id: `recurring-${Date.now()}`,
                    amount,
                    category: selectedCategory,
                    subcategory: selectedSubcategory,
                    description,
                    type: currentType,
                    date: selectedDate.toLocaleDateString(),
                    isRecurring: true,
                    recurringId: Date.now().toString()
                });
            } else {
                transactions.push({
                    id: Date.now().toString(),
                    amount,
                    category: selectedCategory,
                    subcategory: selectedSubcategory,
                    description,
                    type: currentType,
                    date: selectedDate.toLocaleDateString(),
                    isRecurring: false
                });
            }

            saveData();
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('recurring-checkbox').checked = false;
            selectedDate = new Date();
            updateDate();
            updateDisplay();
        }

        // Delete transaction
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            updateDisplay();
        }

        // Switch tab
        function switchTab(tab) {
            document.getElementById('transactions-tab').style.display = tab === 'transactions' ? 'block' : 'none';
            document.getElementById('summary-tab').style.display = tab === 'summary' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Calculate balance
        function getBalance() {
            return transactions.reduce((sum, t) => {
                return t.type === 'income' ? sum + t.amount : sum - t.amount;
            }, 0);
        }

        // Calculate predicted balance
        function getPredictedBalance() {
            let predicted = getBalance();
            recurringTransactions.forEach(r => {
                if (r.type === 'income') {
                    predicted += r.amount;
                } else {
                    predicted -= r.amount;
                }
            });
            return predicted;
        }

        // Update display
        function updateDisplay() {
            const balance = getBalance();
            const predictedBalance = getPredictedBalance();

            const balanceEl = document.getElementById('balance');
            balanceEl.textContent = `€${balance.toFixed(2)}`;
            balanceEl.className = `balance ${balance >= 0 ? 'positive' : 'negative'}`;

            const predictedEl = document.getElementById('predicted-balance');
            predictedEl.textContent = `€${predictedBalance.toFixed(2)}`;
            predictedEl.className = `predicted-amount ${predictedBalance >= 0 ? 'positive' : 'negative'}`;

            // Transactions list
            const list = document.getElementById('transactions-list');
            document.getElementById('trans-count').textContent = `${transactions.length} transactions`;
            list.innerHTML = transactions.length === 0 
                ? '<div class="empty-message">No transactions yet</div>'
                : transactions.map(t => {
                    const displayCategory = t.subcategory || t.category;
                    return `
                        <div class="transaction ${t.isRecurring ? 'recurring' : ''}">
                            <div class="transaction-left">
                                <div class="transaction-icon ${t.type}">
                                    ${t.type === 'income' ? '📥' : '📤'}
                                </div>
                                <div class="transaction-info">
                                    <div class="transaction-category">
                                        ${displayCategory}
                                        ${t.isRecurring ? '<span class="transaction-recurring-badge">🔄 Monthly</span>' : ''}
                                    </div>
                                    ${t.description ? `<div class="transaction-description">${t.description}</div>` : ''}
                                    <div class="transaction-date">${t.date}</div>
                                </div>
                            </div>
                            <div class="transaction-right">
                                <div class="transaction-amount ${t.type}">
                                    ${t.type === 'income' ? '+' : '-'}€${t.amount.toFixed(2)}
                                </div>
                                ${!t.isRecurring ? `<button class="delete-btn" onclick="deleteTransaction('${t.id}')">×</button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

            updateSummary();
        }

        // Update summary
        function updateSummary() {
            const summary = {};

            transactions.forEach(t => {
                const category = t.subcategory || t.category;
                if (!summary[category]) {
                    summary[category] = { amount: 0, type: t.type };
                }
                summary[category].amount += t.amount;
            });

            const summaryEl = document.getElementById('summary-list');
            let html = '';

            const expenses = Object.entries(summary).filter(([_, s]) => s.type === 'expense');
            const incomes = Object.entries(summary).filter(([_, s]) => s.type === 'income');

            const maxExpense = Math.max(...expenses.map(([_, s]) => s.amount), 1);
            const maxIncome = Math.max(...incomes.map(([_, s]) => s.amount), 1);

            if (expenses.length > 0) {
                html += '<div class="section-title" style="color: #FF5252; margin-top: 0;">Expenses</div>';
                html += expenses.map(([cat, s]) => `
                    <div class="summary-row">
                        <div class="summary-category">${cat}</div>
                        <div class="summary-bar-container">
                            <div class="summary-bar" style="width: ${(s.amount/maxExpense)*100}%"></div>
                        </div>
                        <div class="summary-amount">€${s.amount.toFixed(2)}</div>
                    </div>
                `).join('');
            }

            if (incomes.length > 0) {
                html += '<div class="section-title" style="color: #4CAF50; margin-top: 24px;">Income</div>';
                html += incomes.map(([cat, s]) => `
                    <div class="summary-row">
                        <div class="summary-category">${cat}</div>
                        <div class="summary-bar-container">
                            <div class="summary-bar income" style="width: ${(s.amount/maxIncome)*100}%"></div>
                        </div>
                        <div class="summary-amount income">€${s.amount.toFixed(2)}</div>
                    </div>
                `).join('');
            }

            summaryEl.innerHTML = html || '<div class="empty-message">No data yet</div>';
        }

        // Start
        init();
    </script>
</body>
</html>
